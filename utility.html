<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Utility - Log Caricamenti</title>
</head>
<body>
    <a href="index.html">← Torna al Viaggio</a>
    <h3>Storico Caricamenti</h3>
    <ul id="log-list"></ul>

    <script>
        fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const logList = document.getElementById('log-list');
            data.log_caricamenti.forEach(item => {
                let li = document.createElement('li');
                li.innerText = `${item.data} - ${item.evento}: ${item.stato}`;
                logList.appendChild(li);
            });
        });
    </script>
</body>
</html>
