<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Viaggio in Cina 2026</title>
    <style>
        /* Aggiungi qui lo stile CSS comune che abbiamo già consolidato */
        body { font-family: sans-serif; padding: 20px; background: #f5f7fa; }
        .nav-giorni { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { padding: 10px; background: white; border: 1px solid #ccc; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🇨🇳 Viaggio in Cina 2026</h1>
    <div class="nav-giorni">
        <button class="nav-btn" onclick="caricaGiorno('giorno_08')">8 Ago</button>
        <button class="nav-btn" onclick="caricaGiorno('giorno_09')">9 Ago</button>
    </div>
    <div id="contenitore"></div>

    <script>
        function caricaGiorno(nome) {
            fetch('data/' + nome + '.html')
                .then(response => response.text())
                .then(html => { document.getElementById('contenitore').innerHTML = html; });
        }
    </script>
</body>
</html>
