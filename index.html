<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario Cina 2026 - Test 12</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 20px; }
        .btn { display: block; background: #fff; border: 2px solid #27ae60; color: #27ae60; padding: 20px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-size: 18px; font-weight: bold; text-align: center; }
    </style>
    <script>
        // Questa funzione chiama l'app e chiede di aprire il POI specifico per ID
        // È il metodo più preciso in assoluto perché non usa coordinate calcolate da noi
        function openAmapById(poiId, name) {
            var encodedName = encodeURIComponent(name);
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            var url = isIOS ? 
                "iosamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId : 
                "androidamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId;
            
            window.location.href = url;
        }
    </script>
</head>
<body>
    <h3>Test 12 (POI ID Precisione)</h3>
    <!-- POI ID dello Stey Wangfujing ufficiale -->
    <a href="javascript:void(0)" onclick="openAmapById('B0FFG8E9XN', 'Stey Wangfujing');" class="btn">
        📍 Apri Stey Wangfujing (Preciso)
    </a>
</body>
</html>
