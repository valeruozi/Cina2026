<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Il Mio Viaggio in Cina 2026</title>
</head>
<body>
    <h1>Programma Viaggio Cina</h1>
    <div id="viaggio-display">Caricamento in corso...</div>

    <hr>
    <h3>Storico Log</h3>
    <ul id="log-list"></ul>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // Svuota il contenitore
                const container = document.getElementById('viaggio-display');
                container.innerHTML = '';

                // Cicla su tutto il JSON e crea blocchi di testo automaticamente
                for (let tappa in data.viaggio_cina) {
                    let div = document.createElement('div');
                    div.innerHTML = `<h3>${tappa.toUpperCase()}</h3><pre>${JSON.stringify(data.viaggio_cina[tappa], null, 2)}</pre>`;
                    container.appendChild(div);
                }

                // Carica il Log
                const logList = document.getElementById('log-list');
                data.log_caricamenti.forEach(item => {
                    let li = document.createElement('li');
                    li.innerText = `${item.data} - ${item.evento}: ${item.stato}`;
                    logList.appendChild(li);
                });
            });
    </script>
</body>
</html>
