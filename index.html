<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test 9 - Force POI ID</title>
    <script>
        function openAmapForce(poiId, name) {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            var encodedName = encodeURIComponent(name);
            // Il comando 'poiDetail' è quello che il tuo telefono ha dimostrato di accettare
            // senza errori di aggiornamento, e forzando l'ID, non sbaglia edificio.
            var appUrl = isIOS ? 
                "iosamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId : 
                "androidamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId;
            window.location.href = appUrl;
        }
    </script>
</head>
<body>
    <button onclick="openAmapForce('B0FFG8E9XN', 'Stey Wangfujing')">
        📍 Vai allo Stey Wangfujing (Metodo POI ID)
    </button>
</body>
</html>
