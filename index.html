<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario Cina 2026 - Versione 007</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 15px; max-width: 600px; margin: 0 auto; }
        .version-badge { background: #c0392b; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 12px; text-align: center; margin-bottom: 10px; font-weight: bold; }
        .city-card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .day-title { color: #c0392b; font-weight: bold; margin-bottom: 10px; font-size: 16px; border-bottom: 2px solid #f5f7fa; padding-bottom: 8px; }
        .amap-btn { display: block; background: #e8f4fd; color: #1a73e8; padding: 12px; margin: 6px 0; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid #d2e3fc; }
    </style>
    <script>
        // Metodo URI diretto: è il più stabile perché apre un PIN sulla mappa in una posizione definita
        function openMapDirect(lat, lon, name) {
            // Coordinate corrette secondo lo standard GCJ-02 per la Cina
            var url = "amapuri://uri?latitude=" + lat + "&longitude=" + lon + "&name=" + encodeURIComponent(name) + "&zoom=15";
            window.location.href = url;
        }
    </script>
</head>
<body>
    <div class="version-badge">Versione Codice: 007</div>

    <!-- PECHINO -->
    <div class="city-card">
        <div class="day-title">8-12 Ago: Pechino</div>
        <!-- Coordinate corrette e corrette per l'offset di Pechino -->
        <a href="#" onclick="openMapDirect(39.91742, 116.41185, 'Stey Wangfujing'); return false;" class="amap-btn">📍 Hotel: Stey Wangfujing</a>
        <a href="#" onclick="openMapDirect(39.94195, 116.41755, 'Siji Minfu'); return false;" class="amap-btn">📍 Ristorante: Siji Minfu</a>
    </div>

    <!-- SHANGHAI -->
    <div class="city-card">
        <div class="day-title">20-23 Ago: Shanghai</div>
        <!-- Utilizzo di coordinate precise per Moller Villa -->
        <a href="#" onclick="openMapDirect(31.22460, 121.45470, 'Moller Villa'); return false;" class="amap-btn">📍 Hotel: Moller Villa</a>
    </div>
</body>
</html>
