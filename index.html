<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test 18 - Protocollo di Sistema</title>
    <script>
        // Test 18: Risveglio tramite protocollo di sistema nativo
        function openAmapSystem(poiId) {
            // Il protocollo amapuri:// è il "motore" che sta sotto il link web
            var url = "amapuri://detail?poiid=" + poiId;
            window.location.href = url;
        }
    </script>
</head>
<body>
    <h3>Test 18 (Forzatura Nativa)</h3>
    <button onclick="openAmapSystem('B0FFG8E9XN')">
        📍 Apri Stey (Protocollo amapuri)
    </button>
</body>
</html>
