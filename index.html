<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario Cina 2026 - Test 03</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 15px; max-width: 600px; margin: 0 auto; }
        .test-badge { background: #000; color: #fff; padding: 10px; border-radius: 8px; font-size: 16px; text-align: center; margin-bottom: 20px; font-weight: bold; border: 2px solid #2ecc71; }
        .city-card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .day-title { color: #c0392b; font-weight: bold; margin-bottom: 5px; font-size: 16px; border-bottom: 2px solid #f5f7fa; padding-bottom: 8px; }
        .amap-btn { display: block; background: #e8f4fd; color: #1a73e8; padding: 12px; margin: 6px 0; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid #d2e3fc; }
        .ticket-btn { display: block; background: #38a169; color: white; padding: 15px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
    </style>
    <script>
        // TEST 03: Protocollo Nativo + ID Univoco (POI ID)
        // Questo unisce l'apertura sicura dell'app con la precisione del database
        function runTest03(poiId) {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            var appUrl = "";
            
            // Usiamo il comando 'poiDetail' per aprire direttamente la scheda del posto
            if (isIOS) {
                appUrl = "iosamap://poiDetail?sourceApplication=ItinerarioTest&poiid=" + poiId;
            } else {
                appUrl = "androidamap://poiDetail?sourceApplication=ItinerarioTest&poiid=" + poiId;
            }
            
            window.location.href = appUrl;
        }
    </script>
</head>
<body>
    <div class="test-badge">PROVA NUMERO: 03<br><small>Apertura Nativa tramite POI ID</small></div>
    
    <a href="https://drive.google.com/drive/folders/1yyMAudQCVAiROs_vOvmkA4btDsTxQChn" target="_blank" class="ticket-btn">🎫 TUTTI I BIGLIETTI (DRIVE)</a>

    <!-- PECHINO -->
    <div class="city-card">
        <div class="day-title">8-12 Ago: Pechino</div>
        <!-- Ho inserito i POI ID corretti per testare -->
        <a href="#" onclick="runTest03('B0FFG8E9XN'); return false;" class="amap-btn">📍 Hotel: Stey Wangfujing</a>
        <a href="#" onclick="runTest03('B0FFM8C222'); return false;" class="amap-btn">📍 Ristorante: Siji Minfu</a>
        <a href="#" onclick="runTest03('B000A83U4I'); return false;" class="amap-btn">📍 Tempio del Cielo</a>
    </div>
</body>
</html>
