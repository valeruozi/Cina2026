<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cina 2026 - Master</title>
    <style>
        :root {
            --primary: #c0392b; --bg: #f5f7fa; --card-bg: #ffffff;
            --text-main: #333333; --text-muted: #666666; --accent-blue: #3498db;
            --warning: #e67e22; --danger: #e53e3e; --italo: #8e1828;
            --food: #f39c12; --border: #ddd;
        }

        body.dark-mode {
            --bg: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0;
            --text-muted: #aaaaaa; --border: #333; --primary: #e74c3c;
            --accent-blue: #2980b9;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); padding: 15px; max-width: 800px; margin: 0 auto; line-height: 1.5; transition: background 0.3s, color 0.3s; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .theme-btn { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .nav-level-1, .nav-level-2, .nav-giorni { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; scrollbar-width: thin; padding-bottom: 5px; }
        .nav-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; color: var(--text-main); font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn-context { background: var(--bg); border: 1px dashed var(--text-muted); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--text-main); }
        .nav-btn-context.active { background: var(--text-main); color: var(--bg); border-style: solid; }

        .city-container, .tab-content, .day-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .city-container.active, .tab-content.active, .day-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .day-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .day-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 10px; }
        .day-title { color: var(--primary); font-weight: 900; font-size: 20px; margin: 0; }
        .day-subtitle { font-size: 14px; color: var(--text-muted); font-weight: normal; }
        .weight-badge { display: inline-block; background: rgba(52, 152, 219, 0.1); color: var(--accent-blue); padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 15px; }
        
        .info-block { background: var(--bg); border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .info-title { font-size: 12px; text-transform: uppercase; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .data-item { font-size: 14px; }
        .data-label { font-size: 11px; color: var(--text-muted); display: block; }
        .data-value { font-weight: bold; color: var(--text-main); }
        
        .alert-todo { background: rgba(229, 62, 62, 0.1); border-left: 4px solid var(--danger); padding: 12px; border-radius: 4px; font-weight: bold; color: var(--danger); margin-top: 15px; font-size: 14px; }
        .food-tips { background: rgba(243, 156, 18, 0.1); border-left: 4px solid var(--food); }
        
        .timeline { list-style: none; padding: 0; margin: 0; }
        .timeline li { position: relative; padding-left: 25px; margin-bottom: 12px; font-size: 14px; }
        .timeline li::before { content: "•"; position: absolute; left: 0; top: -2px; color: var(--primary); font-size: 20px; }
        .time-badge { font-weight: bold; color: var(--primary); margin-right: 5px; }
        
        .amap-btn { display: block; background: rgba(52, 152, 219, 0.1); color: var(--accent-blue); padding: 12px; margin: 8px 0; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid rgba(52, 152, 219, 0.3); }
        .radar-btn { display: block; background: rgba(155, 89, 182, 0.1); color: #8e44ad; padding: 12px; margin: 8px 0; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid rgba(155, 89, 182, 0.3); }
        .file-btn { display: block; background: var(--text-main); color: var(--bg); padding: 12px; margin: 8px 0; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid var(--border); }
        .track-btn { display: block; background: rgba(142, 24, 40, 0.1); color: var(--italo); padding: 12px; margin: 8px 0; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid rgba(142, 24, 40, 0.3); }
        
        .feature-img { width: 100%; border-radius: 8px; margin-bottom: 10px; object-fit: cover; border: 1px solid var(--border); }
        .copy-badge { background: var(--border); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 15px; letter-spacing: 1px; user-select: all; color: var(--text-main); }
        
        .driver-card { background: var(--card-bg); padding: 30px 20px; text-align: center; border: 2px solid var(--primary); border-radius: 12px; margin-bottom: 20px; }
        .driver-chinese { font-size: 32px; font-weight: bold; margin: 15px 0; color: var(--text-main); }
        
        /* CSS NOTE E NAVIGAZIONE INFERIORE */
        .day-footer { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border); }
        .note-area { width: 100%; min-height: 80px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); font-family: inherit; resize: vertical; box-sizing: border-box; }
        .day-nav-buttons { display: flex; justify-content: space-between; margin-top: 15px; }
        .day-nav-btn { background: var(--card-bg); border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .day-nav-btn:hover { background: var(--primary); color: white; }
    </style>
    <script>
    function openSurl(url) { window.location.href = url; }
    
    function openRadar(lat, lon, keyword) {
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        var encodedKeyword = encodeURIComponent(keyword);
        var url = isIOS ? 
            `iosamap://aroubdpoi?sourceApplication=CoPilot&keywords=${encodedKeyword}&lat=${lat}&lon=${lon}&radius=1000` : 
            `androidamap://aroubdpoi?sourceApplication=CoPilot&keywords=${encodedKeyword}&lat=${lat}&lon=${lon}&radius=1000`;
        window.location.href = url;
    }
    
    function initTheme() {
        const orarioLocale = new Date().getHours();
        if (orarioLocale >= 19 || orarioLocale < 7) { document.body.classList.add('dark-mode'); } 
        else { document.body.classList.remove('dark-mode'); }
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    function showTab(containerId, tabId, element) {
        const container = document.getElementById(containerId);
        container.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        container.querySelectorAll('.nav-level-2 .nav-btn-context').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    function showCity(cityId, element) {
        document.querySelectorAll('.city-container').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-level-1 .nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(cityId).classList.add('active');
        element.classList.add('active');
    }

    function showDay(programId, dayId, element) {
        const container = document.getElementById(programId);
        container.querySelectorAll('.day-section').forEach(el => el.classList.remove('active'));
        container.querySelectorAll('.nav-giorni .nav-btn-context').forEach(btn => btn.classList.remove('active'));
        document.getElementById(dayId).classList.add('active');
        element.classList.add('active');
    }

    function initApp() {
        initTheme(); 
        const today = new Date();
        const dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        let targetBtn = document.querySelector(`button[data-date="${dateStr}"]`);
        
        if (!targetBtn) {
            targetBtn = document.querySelector('button[data-date="2026-08-08"]');
        }
        
        if (targetBtn) {
            const cityContainerId = targetBtn.closest('.city-container').id;
            const cityBtn = document.querySelector(`button[onclick*="${cityContainerId}"]`);
            if(cityBtn) cityBtn.click();
            targetBtn.click();
        }
    }

    window.addEventListener('DOMContentLoaded', () => { initApp(); });

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('Service Worker non ancora configurato'));
        });
    }

    // POPUP TASSISTA
    function showDriverMessage() {
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        `;
        overlay.innerHTML = `
            <div style="font-size: 5vw; text-align: center; color: #555; margin-bottom: 20px;">
                请带我去这里 (Per favore portami qui)
            </div>
            <div style="font-size: 12vw; font-weight: bold; text-align: center; color: black; line-height: 1.2; word-wrap: break-word; width: 100%;">
                Stey王府井酒店<br>
                <span style="font-size: 10vw;">东城区白术胡同</span>
            </div>
            <button onclick="this.parentElement.remove()" style="margin-top: 40px; padding: 15px 40px; font-size: 18px; background: #333; color: white; border: none; border-radius: 10px;">CHIUDI</button>
        `;
        document.body.appendChild(overlay);
    }
    </script>
</head>
<body>

    <div class="header-container">
        <h1>🇨🇳 Cina 2026</h1>
        <button class="theme-btn" onclick="toggleTheme()">🌓 Tema</button>
    </div>

    <div class="nav-level-1">
        <button class="nav-btn active" onclick="showCity('pechino-container', this)">Pechino</button>
        <button class="nav-btn" onclick="showCity('xian-container', this)">Xi'an</button>
    </div>
