<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Viaggio Cina 2026</title>
    <style>
        /* Inserisci qui il tuo CSS globale (colori, bottoni, card) */
        .hub-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .city-section { margin-top: 30px; border-top: 2px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>🇨🇳 Viaggio Cina 2026</h1>
    
    <!-- MENU DINAMICO -->
    <div class="hub-nav" id="menu-giorni">
        <button onclick="carica('giorno_08')">08 Ago</button>
        <button onclick="carica('giorno_09')">09 Ago</button>
    </div>

    <!-- ZONA DINAMICA -->
    <div id="contenitore"></div>

    <!-- DATABASE CITTÀ (Link Rapidi) -->
    <div class="city-section" id="pechino">
        <h2>📍 Pechino: Risorse Utili</h2>
        <a href="https://surl.amap.com/..." class="amap-btn">Elenco Ristoranti e Mappe</a>
    </div>

    <script>
        function carica(file) {
            fetch('data/' + file + '.html')
                .then(r => r.text())
                .then(html => { document.getElementById('contenitore').innerHTML = html; });
        }
        // Scroll automatico al giorno di oggi (esempio logica)
        window.onload = () => { /* Logica per attivare il tasto del giorno corrente */ };
    </script>
</body>
</html>
