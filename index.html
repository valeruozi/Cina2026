<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Definitivi Stey Wangfujing</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-weight: bold; text-align: center; border: none; color: white; }
    </style>
    <script>
        // T14: Ricerca Testuale Pura (nessuna coordinata, solo stringa di query)
        function test14() {
            var name = encodeURIComponent("Stey(王府井店)");
            window.location.href = "androidamap://poi?sourceApplication=Itinerario&keywords=" + name;
        }

        // T15: Link SURL Nativo (il tuo link ufficiale)
        function test15() {
            window.location.href = "https://surl.amap.com/jsHEdsW1f2LY";
        }

        // T16: POI Detail (la scheda tecnica dell'edificio)
        function test16() {
            // ID univoco estratto dal tuo link
            var poiId = "B0FFG8E9XN";
            window.location.href = "androidamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId;
        }

        // T17: Coordinate + Nome (Forzatura offset)
        function test17() {
            // Coordinate corrette dell'edificio in Baishu Hutong
            var lat = 39.91764;
            var lon = 116.41708;
            var name = encodeURIComponent("Stey(王府井店)");
            window.location.href = "androidamap://viewMap?sourceApplication=Itinerario&poiname=" + name + "&lat=" + lat + "&lon=" + lon + "&dev=0";
        }
    </script>
</head>
<body>
    <h3>Testare in ordine da 14 a 17:</h3>
    <button class="btn" style="background: #3498db;" onclick="test14()">Test 14: Ricerca Nome Cinese</button>
    <button class="btn" style="background: #e67e22;" onclick="test15()">Test 15: Link Ufficiale (SURL)</button>
    <button class="btn" style="background: #9b59b6;" onclick="test16()">Test 16: POI ID Dettaglio</button>
    <button class="btn" style="background: #27ae60;" onclick="test17()">Test 17: Coordinate + Nome</button>
</body>
</html>
