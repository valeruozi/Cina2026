<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Confronto T5 vs T15 - Tempio del Cielo</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 20px; }
        .btn-t5 { display: block; background: #fff; border: 2px solid #27ae60; color: #27ae60; padding: 20px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn-t15 { display: block; background: #fff; border: 2px solid #e67e22; color: #e67e22; padding: 20px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-weight: bold; text-align: center; }
    </style>
    <script>
        // Soluzione 5 (Coordinate)
        function openT5(lat, lon, name) {
            var url = "androidamap://viewMap?sourceApplication=Itinerario&poiname=" + encodeURIComponent(name) + "&lat=" + lat + "&lon=" + lon + "&dev=0";
            window.location.href = url;
        }
        // Soluzione 15 (Link Ufficiale)
        function openT15(url) {
            window.location.href = url;
        }
    </script>
</head>
<body>
    <h3>Confronto Precisione: Tempio del Cielo</h3>
    
    <a href="#" onclick="openT15('https://surl.amap.com/a5eB8kS1bWl'); return false;" class="btn-t15">
        📍 Tempio del Cielo (Soluzione 15 - Ufficiale)
    </a>

    <a href="#" onclick="openT5(39.881913, 116.410829, 'Tempio del Cielo'); return false;" class="btn-t5">
        📍 Tempio del Cielo (Soluzione 5 - Coordinate)
    </a>
</body>
</html>
