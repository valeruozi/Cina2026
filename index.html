<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario Cina 2026</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; padding: 15px; max-width: 600px; margin: 0 auto; }
        .city-card { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .day-title { color: #c0392b; font-weight: bold; margin-bottom: 10px; font-size: 16px; border-bottom: 2px solid #f5f7fa; padding-bottom: 8px; }
        .amap-btn { display: block; background: #e8f4fd; color: #1a73e8; padding: 12px; margin: 6px 0; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; border: 1px solid #d2e3fc; }
        .ticket-btn { display: block; background: #38a169; color: white; padding: 15px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .flight-btn { display: block; background: #e53e3e; color: white; padding: 15px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 25px; font-size: 16px; }
    </style>
    <script>
        // Formato corretto: posizione=latitudine,longitudine
        function openMap(lat, lon, name) {
            var url = "https://uri.amap.com/marker?position=" + lat + "," + lon + "&name=" + encodeURIComponent(name) + "&coordinate=gaode";
            window.location.href = url;
        }
    </script>
</head>
<body>
    <a href="https://drive.google.com/drive/folders/1yyMAudQCVAiROs_vOvmkA4btDsTxQChn" target="_blank" class="ticket-btn">🎫 TUTTI I BIGLIETTI (DRIVE)</a>
    <a href="https://drive.google.com/file/d/1Kj9s1akd5hg2pypMyKazCb8icYHT1Jns/view" target="_blank" class="flight-btn">✈️ VOLO AIR CHINA</a>

    <!-- PECHINO (Esempio corretto) -->
    <div class="city-card">
        <div class="day-title">9-12 Ago: Pechino</div>
        <a href="#" onclick="openMap(39.9171, 116.4116, 'Stey Wangfujing Hotel'); return false;" class="amap-btn">📍 Hotel: Stey Wangfujing</a>
        <a href="#" onclick="openMap(39.9418, 116.4174, 'Siji Minfu Roast Duck'); return false;" class="amap-btn">📍 Ristorante: Siji Minfu</a>
    </div>

    <!-- XI'AN -->
    <div class="city-card">
        <div class="day-title">13-14 Ago: Xi'an</div>
        <a href="#" onclick="openMap(34.2536, 108.9463, 'Mehood Lestie Hotel'); return false;" class="amap-btn">📍 Hotel: Mehood Boutique</a>
        <a href="#" onclick="openMap(34.3842, 109.2783, 'Terracotta Army'); return false;" class="amap-btn">📍 Esercito di Terracotta</a>
    </div>
    
    <!-- Aggiungi le altre tappe con lo stesso formato: openMap(LAT, LON, 'NOME') -->
</body>
</html>
