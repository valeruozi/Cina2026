<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Definitivi Siji Minfu</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-weight: bold; text-align: center; border: none; color: white; }
    </style>
    <script>
        // T22: Ricerca Testuale Pura
        function test22() {
            var name = encodeURIComponent("四季民福烤鸭店(灯市口店)");
            window.location.href = "androidamap://poi?sourceApplication=Itinerario&keywords=" + name;
        }

        // T23: Link SURL Nativo
        function test23() {
            window.location.href = "https://surl.amap.com/jSJsgNU139Pj";
        }

        // T24: POI Detail (ID estratto dal tuo link)
        function test24() {
            var poiId = "B0FFM8C222";
            window.location.href = "androidamap://poiDetail?sourceApplication=Itinerario&poiid=" + poiId;
        }

        // T25: Coordinate + Nome
        function test25() {
            var lat = 39.91422;
            var lon = 116.41378;
            var name = encodeURIComponent("四季民福烤鸭店(灯市口店)");
            window.location.href = "androidamap://viewMap?sourceApplication=Itinerario&poiname=" + name + "&lat=" + lat + "&lon=" + lon + "&dev=0";
        }
    </script>
</head>
<body>
    <h3>Testare Siji Minfu (da 22 a 25):</h3>
    <button class="btn" style="background: #3498db;" onclick="test22()">Test 22: Ricerca Nome Cinese</button>
    <button class="btn" style="background: #e67e22;" onclick="test23()">Test 23: Link Ufficiale (SURL)</button>
    <button class="btn" style="background: #9b59b6;" onclick="test24()">Test 24: POI ID Dettaglio</button>
    <button class="btn" style="background: #27ae60;" onclick="test25()">Test 25: Coordinate + Nome</button>
</body>
</html>
